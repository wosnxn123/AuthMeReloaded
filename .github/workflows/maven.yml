name: Java CI

on:
  push:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build_and_test:
    strategy:
      matrix:
        jdkversion: [17, 21]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.jdkversion }}
        cache: 'maven'
    - name: Build with Maven
      run: mvn -V -B clean package --file pom.xml
    - name: Upload Folia jar
      uses: actions/upload-artifact@v4
      if: success() && matrix.jdkversion == 21
      with:
        name: AuthMe-Folia
        path: authme-folia/target/AuthMe-*-Folia.jar
        if-no-files-found: error
    - name: Upload Spigot jar
      uses: actions/upload-artifact@v4
      if: success() && matrix.jdkversion == 21
      with:
        name: AuthMe-Spigot
        path: authme-spigot-1.21/target/AuthMe-*-Spigot.jar
        if-no-files-found: warn
    - name: Create Release
      if: github.ref == 'refs/heads/master' && success() && matrix.jdkversion == 21
      uses: softprops/action-gh-release@v2
      with:
        tag_name: folia-${{ github.sha }}
        name: AuthMe Folia Build ${{ github.sha }}
        files: |
          authme-folia/target/AuthMe-*-Folia.jar
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
